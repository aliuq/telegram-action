name: "Telegram Message Notification"
author: "AliuQ"
description: "Send Telegram messages, attachments, and interactive buttons"
inputs:
  message:
    description: "Message text to send, or the caption when an attachment is provided"
    required: false
    default: ""
  buttons:
    description: >
      Inline keyboard buttons in JSON. Supports two formats:
      flat array (single row): [{"text":"…","url":"…"}]
      nested array (multi-row): [[{"text":"…","url":"…"}],[{"text":"…","url":"…"}]]
    required: false
    default: ""
  disable_link_preview:
    description: 'Disable link previews. Only "true" and "false" are accepted.'
    required: false
    default: "true"
  attachment:
    description: "Attachment source. Supports local file paths, public URLs, or Telegram file_ids."
    required: false
    default: ""
  attachment_type:
    description: 'Attachment type. Supported values: "photo", "video", "audio", "animation", and "document".'
    required: false
    default: ""
  attachment_filename:
    description: "Optional filename override when uploading a local file."
    required: false
    default: ""

outputs:
  message_id:
    description: "ID of the sent message"
  status:
    description: "Status of the action ('success')"

runs:
  using: "node24"
  main: "dist/index.js"

branding:
  icon: "message-square"
  color: "blue"
