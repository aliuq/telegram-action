name: "Telegram Message Notification"
author: "AliuQ"
description: "Send Telegram messages, attachments, and interactive buttons"
inputs:
  message:
    description: "Message text to send, or the caption when an attachment is provided"
    required: false
    default: ""
  message_file:
    description: "Repository-local file path whose UTF-8 contents become the message body."
    required: false
    default: ""
  message_url:
    description: "Remote HTTP(S) URL whose response body becomes the message body."
    required: false
    default: ""
  stream_response:
    description: 'Stream a text-only response in supported private chats using the action''s built-in sendMessageDraft flow. Long outputs become reply-chained final messages. Other chats fall back to normal sendMessage behavior. Only "true" and "false" are accepted.'
    required: false
    default: "false"
  buttons:
    description: >
      Inline keyboard buttons in JSON. Supports two formats:
      flat array (single row): [{"text":"…","url":"…"}]
      nested array (multi-row): [[{"text":"…","url":"…"}],[{"text":"…","url":"…"}]]
    required: false
    default: ""
  disable_link_preview:
    description: 'Disable link previews. Only "true" and "false" are accepted.'
    required: false
    default: "true"
  attachment:
    description: "Attachment source. Supports local file paths, public URLs, or Telegram file_ids."
    required: false
    default: ""
  attachments:
    description: >
      JSON array of attachment objects for multi-media sends.
      Each item supports: {"type":"photo|video|audio|animation|document","source":"...","filename":"optional","caption":"optional"}
    required: false
    default: ""
  attachment_type:
    description: 'Attachment type. Supported values: "photo", "video", "audio", "animation", and "document".'
    required: false
    default: ""
  attachment_filename:
    description: "Optional filename override when uploading a local file."
    required: false
    default: ""
  supports_streaming:
    description: 'Enable Telegram streaming mode for single video sends. Only "true" and "false" are accepted.'
    required: false
    default: "false"

outputs:
  message_id:
    description: "ID of the last sent message"
  status:
    description: "Status of the action ('success')"

runs:
  using: "node24"
  main: "dist/index.js"

branding:
  icon: "message-square"
  color: "blue"
