name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      scenario_ids:
        description: "Comma-separated scenario ids to run, or 'all'"
        required: false
        default: "all"

jobs:
  notification:
    runs-on: ubuntu-latest
    env:
      # Suppress DEP0169 warnings emitted by the action runtime under act.
      NODE_OPTIONS: --no-deprecation
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        # Keep this list in sync with scripts/scenarios.json. The lint script
        # verifies that both sources describe the same scenario ids.
        scenario_id:
          - basic
          - link-preview-enabled
          - buttons-flat
          - buttons-nested
          - buttons-callback
          - photo-local
          - document-local
          - video-url
          - group-reply
          - group-reply-with-buttons
          - invalid-buttons
    steps:
      - uses: actions/checkout@v6

      - id: scenario
        name: Select and load scenario
        uses: actions/github-script@v8
        env:
          SCENARIO_IDS: ${{ inputs.scenario_ids || 'all' }}
          SCENARIO_ID: ${{ matrix.scenario_id }}
        with:
          script: |
            const { pathToFileURL } = await import('node:url')
            const moduleUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/github-script/select-and-load-scenario.mjs`).href
            const { selectAndLoadScenario } = await import(moduleUrl)
            await selectAndLoadScenario({
              core,
              scenarioIds: process.env.SCENARIO_IDS,
              scenarioId: process.env.SCENARIO_ID,
            })

      - id: run_scenario
        name: Run scenario — ${{ matrix.scenario_id }}
        if: ${{ steps.scenario.outputs.should_run == 'true' }}
        continue-on-error: true
        uses: ./
        env:
          ACT_SCENARIO_ID: ${{ matrix.scenario_id }}
        with:
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ steps.scenario.outputs.requires_group == 'true' && secrets.TELEGRAM_CHAT_ID_GROUP || secrets.TELEGRAM_CHAT_ID }}
          reply_to_message_id: ${{ steps.scenario.outputs.requires_group == 'true' && secrets.TELEGRAM_REPLY_TO_MESSAGE_ID || '' }}
          message: ${{ steps.scenario.outputs.message }}
          buttons: ${{ steps.scenario.outputs.buttons }}
          disable_link_preview: ${{ steps.scenario.outputs.disable_link_preview }}
          attachment: ${{ steps.scenario.outputs.attachment }}
          attachment_type: ${{ steps.scenario.outputs.attachment_type }}
          attachment_filename: ${{ steps.scenario.outputs.attachment_filename }}

      - name: Assert scenario outcome
        if: ${{ steps.scenario.outputs.should_run == 'true' }}
        uses: actions/github-script@v8
        env:
          SCENARIO_ID: ${{ matrix.scenario_id }}
          EXPECT_FAILURE: ${{ steps.scenario.outputs.expect_failure }}
          SCENARIO_OUTCOME: ${{ steps.run_scenario.outcome }}
        with:
          script: |
            const { pathToFileURL } = await import('node:url')
            const moduleUrl = pathToFileURL(`${process.env.GITHUB_WORKSPACE}/scripts/github-script/assert-scenario-outcome.mjs`).href
            const { assertScenarioOutcome } = await import(moduleUrl)
            await assertScenarioOutcome({
              core,
              scenarioId: process.env.SCENARIO_ID,
              expectFailure: process.env.EXPECT_FAILURE,
              outcome: process.env.SCENARIO_OUTCOME,
            })

      - name: Print outputs
        if: ${{ steps.scenario.outputs.should_run == 'true' && steps.scenario.outputs.expect_failure != 'true' && steps.run_scenario.outcome == 'success' }}
        run: |
          echo "message_id=${{ steps.run_scenario.outputs.message_id }}"
          echo "status=${{ steps.run_scenario.outputs.status }}"
